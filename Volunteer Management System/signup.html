<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Management - Sign Up</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.3.3/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.3.3/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.3.3/firebase-database.js"></script>
</head>
<body>

    <div class="container">
        <div class="login-card">
            <div class="image-side">
                <img src="./images/login.avif" alt="Volunteers helping" class="login-image">
                <div class="image-overlay">
                    <h2>Volunteer Management System</h2>
                    <p>Together we can make a difference</p>
                </div>
            </div>
            
            <div class="form-side">
                <h1>Welcome User</h1>
                <p class="subtitle">Create your account</p>
                
                <form id="signupForm">
                    <div class="input-group">
                        <label for="name">Enter Name</label>
                        <input type="text" id="name" placeholder="Enter your name">
                        <small class="error" id="nameError"></small>
                    </div>
                    
                    <div class="input-group">
                        <label for="fname">Enter Father Name</label>
                        <input type="text" id="fname" placeholder="Enter your father name">
                        <small class="error" id="fnameError"></small>
                    </div>
                    
                    <div class="input-group">
                        <label for="email">Enter Email Address</label>
                        <input type="email" id="email" placeholder="Enter your email">
                        <small class="error" id="emailError"></small>
                    </div>
                    
                    <div class="input-group">
                        <label for="password">Enter Password</label>
                        <input type="password" id="password" placeholder="Enter your password">
                        <small class="error" id="passwordError"></small>
                    </div>

                    <div class="input-group">
    <label>Select Role</label>
    <select id="role">
        <option value="">Select Role</option>
        <option value="admin">Admin</option>
        <option value="volunteer">Volunteer</option>
    </select>
    <small class="error" id="roleError"></small>
</div>
                    
                    <button type="submit" class="login-btn">Sign up</button>
                </form>
                
                <p class="register-link">
                    Already have an account? 
                    <a href="./index.html">Login here</a>
                </p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
